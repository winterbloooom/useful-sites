name: "사이트 수정"
description: "기존 사이트 정보를 수정합니다."
labels: ["edit"]
body:
  - type: markdown
    attributes:
      value: "바꿀 항목만 수정하고, 나머지는 그대로 두세요."
  - type: input
    id: original_name
    attributes:
      label: "현재 이름 (수정 금지)"
      description: "항목 식별용입니다. 이 값을 바꾸면 처리되지 않습니다."
    validations:
      required: true
  - type: input
    id: original_category
    attributes:
      label: "현재 카테고리 (수정 금지)"
      description: "항목 식별용입니다."
    validations:
      required: true
  - type: input
    id: name
    attributes:
      label: "이름"
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: "URL"
    validations:
      required: false
  - type: input
    id: desc
    attributes:
      label: "설명"
    validations:
      required: false
  - type: input
    id: category
    attributes:
      label: "카테고리"
      description: "글쓰기 / 연구 / 변환 / 개발 / 시각화 / 디자인소재 / 템플릿 / 통계·동향 / 브랜딩"
    validations:
      required: true
  - type: dropdown
    id: pick
    attributes:
      label: "자주 사용"
      options:
        - "예"
        - "아니오"
    validations:
      required: true
