name: "사이트 수정"
description: "기존 사이트 정보를 수정합니다. 바꿀 항목만 수정하고 제출하세요."
title: "[수정] "
labels: ["edit"]
body:
  - type: markdown
    attributes:
      value: "모든 칸이 현재 값으로 채워져 있습니다. 바꿀 부분만 수정하세요."
  - type: input
    id: name
    attributes:
      label: "이름"
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: "URL"
    validations:
      required: false
  - type: input
    id: desc
    attributes:
      label: "설명"
    validations:
      required: false
  - type: dropdown
    id: category
    attributes:
      label: "카테고리"
      options:
        - "(변경 안 함)"
        - 글쓰기
        - 연구
        - 변환
        - 개발
        - 시각화
        - 디자인소재
        - 템플릿
        - 통계·동향
        - 브랜딩
    validations:
      required: true
  - type: dropdown
    id: pick
    attributes:
      label: "자주 사용"
      options:
        - "(변경 안 함)"
        - "예"
        - "아니오"
    validations:
      required: true
