name: Delete tool
description: Request removal of an existing tool entry
title: "[Delete] "
labels:
  - tool-delete
body:
  - type: input
    id: name
    attributes:
      label: Name
      description: Name of the entry to remove
      placeholder: Grammarly
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL
      description: Helps identify the exact entry
      placeholder: https://app.grammarly.com/
  - type: input
    id: category
    attributes:
      label: Category
      description: Optional if the name and URL already identify the entry
      placeholder: utils
