name: Edit tool
description: Request an update to an existing tool entry
title: "[Edit] "
labels: [tool-edit]
body:
  - type: input
    id: current_name
    attributes:
      label: Current name
    validations:
      required: true
  - type: input
    id: current_url
    attributes:
      label: Current URL
  - type: input
    id: current_category
    attributes:
      label: Current category
  - type: input
    id: current_frequently_used
    attributes:
      label: Current frequently used
  - type: dropdown
    id: field
    attributes:
      label: What do you want to change?
      options:
        - Name
        - URL
        - Category
        - Description
        - Frequently used
        - Multiple fields
    validations:
      required: true
  - type: input
    id: new_name
    attributes:
      label: New name
  - type: input
    id: new_url
    attributes:
      label: New URL
  - type: dropdown
    id: new_category
    attributes:
      label: New category
      options:
        - No change
        - utils
        - writing
        - programming
        - converter
        - audio
        - math
        - visualization
        - diagram
        - branding
        - generation
        - dictionary
        - english
        - uncategorized
  - type: textarea
    id: new_description
    attributes:
      label: New description
  - type: dropdown
    id: frequently_used
    attributes:
      label: Frequently used
      options:
        - No change
        - Yes
        - No
  - type: textarea
    id: notes
    attributes:
      label: Notes
