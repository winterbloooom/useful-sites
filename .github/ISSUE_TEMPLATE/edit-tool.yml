name: Edit tool
description: Request an update to an existing tool entry
title: "[Edit] "
labels:
  - tool-edit
body:
  - type: input
    id: current_name
    attributes:
      label: Current name
      placeholder: Grammarly
    validations:
      required: true
  - type: input
    id: current_url
    attributes:
      label: Current URL
      placeholder: https://app.grammarly.com/
  - type: dropdown
    id: field
    attributes:
      label: What do you want to change?
      options:
        - Name
        - URL
        - Category
        - Description
        - Frequently used
        - Multiple fields
    validations:
      required: true
  - type: input
    id: new_name
    attributes:
      label: New name
  - type: input
    id: new_url
    attributes:
      label: New URL
  - type: input
    id: new_category
    attributes:
      label: New category
      placeholder: Leave blank if unchanged
  - type: textarea
    id: new_description
    attributes:
      label: New description
      placeholder: Leave blank if unchanged
  - type: input
    id: frequently_used
    attributes:
      label: Frequently used
      placeholder: No change / Yes / No
  - type: textarea
    id: notes
    attributes:
      label: Notes
      placeholder: Optional context
