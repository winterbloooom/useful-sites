name: Process tool issues

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: write
  issues: write

jobs:
  update-tools:
    if: contains(github.event.issue.labels.*.name, 'tool-add') || contains(github.event.issue.labels.*.name, 'tool-edit') || contains(github.event.issue.labels.*.name, 'tool-delete')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Process issue form
        id: process
        continue-on-error: true
        run: python .github/scripts/process_issue.py

      - name: Check for data changes
        id: diff
        if: steps.process.outcome == 'success'
        run: |
          if git diff --quiet -- websites.json websites-data.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updates
        if: steps.process.outcome == 'success' && steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add websites.json websites-data.js
          git commit -m "Update tools from issue #${{ github.event.issue.number }}"
          git push

      - name: Comment on success
        if: steps.process.outcome == 'success'
        env:
          PROCESS_MESSAGE: ${{ steps.process.outputs.message }}
          CHANGED: ${{ steps.diff.outputs.changed }}
        uses: actions/github-script@v7
        with:
          script: |
            const message = process.env.PROCESS_MESSAGE;
            const changed = process.env.CHANGED === 'true';
            const body = changed
              ? `${message}\n\nwebsites.json and websites-data.js were updated from this issue.`
              : `${message}\n\nNo file change was needed.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Comment on failure
        if: steps.process.outcome != 'success'
        env:
          PROCESS_MESSAGE: ${{ steps.process.outputs.message }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Issue processing failed.\n\n${process.env.PROCESS_MESSAGE || 'Unknown error.'}`
            });

      - name: Close issue
        if: steps.process.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

      - name: Mark workflow failed
        if: steps.process.outcome != 'success'
        run: exit 1
