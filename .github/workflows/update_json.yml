name: Update toolbox.json from Issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'add') || contains(github.event.issue.labels.*.name, 'edit') || contains(github.event.issue.labels.*.name, 'delete')
    steps:
      - name: Check maintainer permission (add/delete only)
        if: contains(github.event.issue.labels.*.name, 'add') || contains(github.event.issue.labels.*.name, 'delete')
        uses: actions/github-script@v7
        with:
          script: |
            const assoc = context.payload.issue.author_association;
            const allowed = ['OWNER', 'MEMBER', 'COLLABORATOR'];
            if (!allowed.includes(assoc)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '⛔ 사이트 추가/삭제는 maintainer만 가능합니다. 권한이 없어 처리되지 않았습니다.',
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed',
                state_reason: 'not_planned',
              });
              core.setFailed(`Permission denied: author_association="${assoc}"`);
            }

      - uses: actions/checkout@v4

      - name: Parse issue and update JSON
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = context.payload.issue.body;
            const labels = context.payload.issue.labels.map(l => l.name);

            function parseField(name) {
              const regex = new RegExp(`### ${name}\\s*\\n\\n([\\s\\S]*?)(?=\\n###|$)`);
              const match = body.match(regex);
              if (!match) return '';
              return match[1].trim();
            }


            const data = JSON.parse(fs.readFileSync('toolbox.json', 'utf8'));

            if (labels.includes('add')) {
              const name = parseField('사이트 이름');
              const url = parseField('URL');
              const desc = parseField('설명');
              const category = parseField('카테고리');
              const pickRaw = parseField('표시');
              const pick = pickRaw.includes('[X]') || pickRaw.includes('[x]');

              if (!name || !category || !data[category]) {
                core.setFailed(`Invalid name or category: name="${name}", category="${category}"`);
                return;
              }

              data[category].push({ name, url: url || '', desc: desc || '', pick });
              console.log(`Added "${name}" to "${category}"`);

            } else if (labels.includes('edit')) {
              const origName = parseField('현재 이름 \\(수정 금지\\)');
              const origCat = parseField('현재 카테고리 \\(수정 금지\\)');
              const newName = parseField('이름');
              const newUrl = parseField('URL');
              const newDesc = parseField('설명');
              const newCategory = parseField('카테고리');
              const newPick = parseField('자주 사용');

              // Find the item by original name/category
              let foundCat = origCat && data[origCat] ? origCat : null;
              let foundIdx = -1;

              if (foundCat) {
                foundIdx = data[foundCat].findIndex(item => item.name === origName);
              }
              if (foundIdx === -1) {
                for (const cat of Object.keys(data)) {
                  const idx = data[cat].findIndex(item => item.name === origName);
                  if (idx !== -1) { foundCat = cat; foundIdx = idx; break; }
                }
              }
              if (foundIdx === -1) {
                core.setFailed(`Site not found: "${origName}" in "${origCat}"`);
                return;
              }

              const item = data[foundCat][foundIdx];

              // Update all fields with submitted values
              if (newName) item.name = newName;
              if (newUrl !== undefined) item.url = newUrl;
              if (newDesc !== undefined) item.desc = newDesc;
              item.pick = newPick === '예';

              // Move category if changed
              if (newCategory && newCategory !== foundCat && data[newCategory]) {
                data[foundCat].splice(foundIdx, 1);
                data[newCategory].push(item);
                console.log(`Moved "${origName}" from "${foundCat}" to "${newCategory}"`);
              } else if (newCategory && !data[newCategory]) {
                core.setFailed(`Invalid category: "${newCategory}"`);
                return;
              }

              console.log(`Edited "${origName}"`);

            } else if (labels.includes('delete')) {
              const delName = parseField('이름');
              const delCat = parseField('카테고리');

              let foundCat = delCat && data[delCat] ? delCat : null;
              let foundIdx = -1;

              if (foundCat) {
                foundIdx = data[foundCat].findIndex(item => item.name === delName);
              }
              if (foundIdx === -1) {
                for (const cat of Object.keys(data)) {
                  const idx = data[cat].findIndex(item => item.name === delName);
                  if (idx !== -1) { foundCat = cat; foundIdx = idx; break; }
                }
              }
              if (foundIdx === -1) {
                core.setFailed(`Site not found: "${delName}"`);
                return;
              }

              data[foundCat].splice(foundIdx, 1);
              console.log(`Deleted "${delName}" from "${foundCat}"`);
            }

            fs.writeFileSync('toolbox.json', JSON.stringify(data, null, 4) + '\n');

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add toolbox.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update toolbox.json via issue #${{ github.event.issue.number }}"
          git push

      - name: Close issue on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ toolbox.json이 업데이트되었습니다. 이 이슈는 자동으로 닫힙니다.',
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ 처리 중 오류가 발생했습니다. 입력 내용을 확인해 주세요.\n\n자세한 내용은 [Actions 로그](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')를 참고하세요.',
            });
