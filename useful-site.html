<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Useful Tools Directory</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./tools.css">
    </head>

    <body>
        <header class="topbar">
            <div class="topbar-inner">
                <div class="brand-wrap">
                    <p class="eyebrow">Useful Links Directory</p>
                    <h1>Tools You Actually Use</h1>
                </div>
                <div class="topbar-actions">
                    <a id="add-issue-btn" class="btn btn-primary" target="_blank" rel="noreferrer">Add Issue</a>
                    <a id="edit-issue-btn" class="btn" target="_blank" rel="noreferrer">Edit Issue</a>
                    <a id="delete-issue-btn" class="btn btn-danger" target="_blank" rel="noreferrer">Delete Issue</a>
                </div>
            </div>
        </header>

        <main class="layout">
            <section class="panel panel-list" aria-label="Tools list">
                <div class="panel-head">
                    <h2>List</h2>
                    <p id="list-meta" class="panel-meta"></p>
                </div>

                <div class="filters">
                    <label class="field">
                        <span>Search</span>
                        <input id="search-input" type="search" placeholder="Find by name, description, category">
                    </label>
                    <label class="field">
                        <span>Category</span>
                        <select id="category-filter"></select>
                    </label>
                </div>

                <p class="panel-note">
                    This page is read-only. Use the GitHub Issue buttons to request add, edit, or delete changes.
                </p>

                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Tag</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="tool-rows"></tbody>
                    </table>
                </div>
            </section>
        </main>

        <template id="row-template">
            <tr>
                <td class="name-cell"></td>
                <td class="category-cell"></td>
                <td class="tag-cell"></td>
                <td class="action-cell"></td>
            </tr>
        </template>

        <script src="./websites-data.js"></script>
        <script src="./script.js"></script>
    </body>
</html>
